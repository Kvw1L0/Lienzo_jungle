<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc",
            authDomain: "jungle-multiverse.firebaseapp.com",
            databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com",
            projectId: "jungle-multiverse",
            storageBucket: "jungle-multiverse.firebasestorage.app",
            messagingSenderId: "648498270563",
            appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let stickmen = [];
        let isGlobalFrozen = false; // Variable de control del ADMIN

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Stickman {
            constructor(data, id) {
                this.id = id;
                this.paths = data.paths || [];
                this.name = data.userName || "Explorador";
                
                // APARICIÓN ESTELAR
                this.isEntering = true;
                this.x = -300; // Inicia fuera de la pantalla por la izquierda
                this.y = Math.random() * (canvas.height - 200) + 100;
                this.targetX = 100 + Math.random() * (canvas.width / 2); // Punto de llegada
                this.trail = []; // Rastro mágico
                
                // Velocidad fija post-entrada
                this.speed = 2.5; 
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
                
                this.time = 0;
                this.collisionEffect = 0;
            }

            update(dt) {
                if (isGlobalFrozen) return; // Si el admin congeló todo, no se mueve

                if (this.isEntering) {
                    // Efecto volar rápido al entrar
                    this.x += 15;
                    this.trail.push({x: this.x, y: this.y, color: `hsl(${Math.random() * 360}, 100%, 50%)`});
                    if (this.trail.length > 15) this.trail.shift();
                    
                    if (this.x >= this.targetX) {
                        this.isEntering = false;
                        this.trail = []; // Limpiar rastro
                    }
                } else {
                    // Movimiento normal Pac-Man
                    this.time += dt;
                    this.x += this.vx;
                    this.y += this.vy;

                    const margin = 100;
                    if (this.x > canvas.width + margin) this.x = -margin;
                    if (this.x < -margin) this.x = canvas.width + margin;
                    if (this.y > canvas.height + margin) this.y = -margin;
                    if (this.y < -margin) this.y = canvas.height + margin;
                }
                
                if (this.collisionEffect > 0) this.collisionEffect -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Dibujar Rastro Estelar
                if (this.isEntering) {
                    this.trail.forEach((t, i) => {
                        ctx.beginPath();
                        ctx.fillStyle = t.color;
                        ctx.globalAlpha = i / this.trail.length;
                        ctx.arc(t.x - this.x, t.y - this.y, 10, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    ctx.globalAlpha = 1;
                }
                
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                // Dibujar trazos con sus respectivos colores
                if (this.paths.length > 0) {
                    this.paths.forEach(pathObj => {
                        if(pathObj.points && pathObj.points.length > 0) {
                            ctx.strokeStyle = pathObj.color || '#00ff88';
                            ctx.beginPath();
                            ctx.moveTo(pathObj.points[0].x - 150, pathObj.points[0].y - 175);
                            pathObj.points.forEach(p => ctx.lineTo(p.x - 150, p.y - 175));
                            ctx.stroke();
                        }
                    });
                }

                // Nombre
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 200);

                // Corazón
                if (this.collisionEffect > 0) {
                    ctx.font = "50px Arial";
                    ctx.globalAlpha = this.collisionEffect;
                    ctx.fillText("❤️", 0, -50);
                }

                ctx.restore();
            }
        }

        // Firebase Listeners (Dibujos nuevos)
        database.ref('stickmen').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data && data.paths) stickmen.push(new Stickman(data, snapshot.key));
        });

        // Firebase Listener (Borrar lienzo desde Admin)
        database.ref('stickmen').on('value', (snapshot) => {
            if (!snapshot.exists()) stickmen = []; // Vacia la pantalla
        });

        // Firebase Listener (Congelar desde Admin)
        database.ref('gameState/frozen').on('value', (snapshot) => {
            isGlobalFrozen = snapshot.val() || false;
        });

        let lastTime = performance.now();
        function animate(now) {
            const dt = now - lastTime;
            lastTime = now;
            
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stickmen.forEach((s, i) => {
                s.update(dt * 0.1);
                s.draw();

                if(!isGlobalFrozen && !s.isEntering) {
                    for(let j = i + 1; j < stickmen.length; j++) {
                        const other = stickmen[j];
                        if(!other.isEntering && Math.hypot(s.x - other.x, s.y - other.y) < 80) {
                            s.collisionEffect = 1; other.collisionEffect = 1;
                        }
                    }
                }
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
