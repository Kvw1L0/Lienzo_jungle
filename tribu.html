<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display V4</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let avatars = [];
        let globalState = { frozen: false, formation: false, spinAll: false, shiver: false, earthRotation: false, parade: false, zoomTargetId: null };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Avatar {
            constructor(data, id, index) {
                this.id = id; this.paths = data.paths || []; this.name = data.userName || "";
                this.message = data.message || ""; this.messageTime = data.messageTime || 0;
                this.isSpinning = data.isSpinning || false; this.isStarPower = data.isStarPower || false;
                
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 4; this.vy = (Math.random() - 0.5) * 4;
                this.rotation = 0; this.yRotationAngle = 0; this.index = index;

                // TÉCNICA DE RASTERIZACIÓN: Dibujamos en un canvas invisible una sola vez
                this.offscreen = document.createElement('canvas');
                this.offscreen.width = 300; this.offscreen.height = 350;
                this.renderToBuffer();
            }

            renderToBuffer() {
                const bCtx = this.offscreen.getContext('2d');
                bCtx.lineWidth = 6; bCtx.lineCap = 'round'; bCtx.lineJoin = 'round';
                this.paths.forEach(path => {
                    bCtx.strokeStyle = path.color || '#EC0000';
                    bCtx.beginPath();
                    if(path.points.length > 0) {
                        bCtx.moveTo(path.points[0].x, path.points[0].y);
                        path.points.forEach(p => bCtx.lineTo(p.x, p.y));
                    }
                    bCtx.stroke();
                });
            }

            update(dt) {
                if (globalState.zoomTargetId === this.id) {
                    this.x += (canvas.width / 2 - this.x) * 0.1;
                    this.y += (canvas.height / 2 - this.y) * 0.1;
                    return;
                }

                if (globalState.parade) {
                    const rowHeight = canvas.height / 4;
                    const row = this.index % 4;
                    this.y += (row * rowHeight + rowHeight/2 - this.y) * 0.05;
                    this.x += (2 + row); // Efecto carrusel a distintas velocidades
                    if (this.x > canvas.width + 150) this.x = -150;
                } else if (globalState.formation) {
                    let cols = Math.ceil(Math.sqrt(avatars.length));
                    let tx = (this.index % cols) * (canvas.width/cols) + (canvas.width/cols/2);
                    let ty = Math.floor(this.index/cols) * (canvas.height/cols) + (canvas.height/cols/2);
                    this.x += (tx - this.x) * 0.1; this.y += (ty - this.y) * 0.1;
                } else if (!globalState.frozen) {
                    this.x += this.vx; this.y += this.vy;
                    if (this.x < 50 || this.x > canvas.width - 50) this.vx *= -1;
                    if (this.y < 50 || this.y > canvas.height - 50) this.vy *= -1;
                }

                if(globalState.earthRotation) this.yRotationAngle += 0.05;
                if(this.isSpinning || globalState.spinAll) this.rotation += 0.1;
            }

            draw() {
                let drawX = this.x; let drawY = this.y;
                if(globalState.shiver) {
                    drawX += (Math.random() - 0.5) * 10;
                    drawY += (Math.random() - 0.5) * 10;
                }

                ctx.save();
                ctx.translate(drawX, drawY);
                
                // Efecto Zoom
                if(globalState.zoomTargetId === this.id) ctx.scale(2.5, 2.5);
                
                // Rotación eje Y (Tipo Tierra)
                if(globalState.earthRotation) ctx.scale(Math.cos(this.yRotationAngle), 1);
                
                ctx.rotate(this.rotation);

                // Dibujar la imagen rasterizada (Alto rendimiento)
                const starColor = `hsl(${(Date.now() / 5) % 360}, 100%, 60%)`;
                if(this.isStarPower) { ctx.shadowBlur = 20; ctx.shadowColor = starColor; }
                ctx.drawImage(this.offscreen, -150, -175);
                ctx.shadowBlur = 0;

                // Nombre
                ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 190);

                ctx.restore();
                
                // Chat (No rota ni escala con el cuerpo)
                if (this.message !== "" && (Date.now() - this.messageTime) < 6000) {
                    ctx.save();
                    ctx.translate(drawX, drawY);
                    ctx.fillStyle = "white"; ctx.beginPath(); ctx.roundRect(-60, -230, 120, 40, 10); ctx.fill();
                    ctx.fillStyle = "black"; ctx.font = "14px Arial"; ctx.textAlign = "center";
                    ctx.fillText(this.message, 0, -205);
                    ctx.restore();
                }
            }
        }

        database.ref('avatars').on('child_added', (snap) => avatars.push(new Avatar(snap.val(), snap.key, avatars.length)));
        database.ref('avatars').on('child_changed', (snap) => {
            const a = avatars.find(i => i.id === snap.key);
            if(a) { a.message = snap.val().message; a.messageTime = snap.val().messageTime; a.isSpinning = snap.val().isSpinning; a.isStarPower = snap.val().isStarPower; }
        });
        database.ref('avatars').on('value', (snap) => { if(!snap.exists()) avatars = []; });
        database.ref('gameState').on('value', (snap) => { if(snap.exists()) globalState = snap.val(); });

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            avatars.forEach(a => { a.update(); a.draw(); });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
