<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display V3</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>
    
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let avatars = [];
        let globalState = { frozen: false, formation: false, spinAll: false };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Avatar {
            constructor(data, id, index) {
                this.id = id; this.paths = data.paths || []; this.name = data.userName || "";
                this.message = data.message || ""; this.messageTime = data.messageTime || 0;
                this.isSpinning = data.isSpinning || false; this.isStarPower = data.isStarPower || false;
                
                // Entran desde un punto aleatorio
                this.x = Math.random() * (canvas.width - 200) + 100; 
                this.y = Math.random() * (canvas.height - 200) + 100;
                this.rotation = 0; this.collisionTimer = 0;
                
                // Velocidad garantizada
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * (Math.random() * 2 + 2); 
                this.vy = Math.sin(angle) * (Math.random() * 2 + 2);
                this.index = index; 
            }

            update() {
                // 1. Giro
                if (this.isSpinning || globalState.spinAll) { this.rotation += 0.1; } 
                else { this.rotation += (0 - this.rotation) * 0.1; } // Vuelve al centro

                // 2. Movimiento Físico
                if (globalState.formation) {
                    const cols = Math.max(1, Math.ceil(Math.sqrt(avatars.length)));
                    const w = canvas.width / cols;
                    const h = canvas.height / Math.ceil(avatars.length / cols);
                    const targetX = (this.index % cols) * w + (w/2);
                    const targetY = Math.floor(this.index / cols) * h + (h/2);
                    
                    this.x += (targetX - this.x) * 0.05;
                    this.y += (targetY - this.y) * 0.05;
                } else if (!globalState.frozen) {
                    this.x += this.vx; 
                    this.y += this.vy;
                    
                    // Rebote en bordes (120px de margen visual)
                    const margin = 120; 
                    if (this.x > canvas.width - margin) { this.x = canvas.width - margin; this.vx *= -1; }
                    if (this.x < margin) { this.x = margin; this.vx *= -1; }
                    if (this.y > canvas.height - margin) { this.y = canvas.height - margin; this.vy *= -1; }
                    if (this.y < margin) { this.y = margin; this.vy *= -1; }
                }

                if(this.collisionTimer > 0) this.collisionTimer -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation); 
                
                ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                
                const starColor = `hsl(${(Date.now() / 5) % 360}, 100%, 60%)`;
                if(this.isStarPower) { ctx.shadowBlur = 20; ctx.shadowColor = starColor; }

                // Dibujar Trazos
                if (this.paths.length > 0) {
                    this.paths.forEach(pathObj => {
                        if(pathObj.points && pathObj.points.length > 0) {
                            ctx.strokeStyle = this.isStarPower ? starColor : (pathObj.color || '#EC0000');
                            ctx.beginPath();
                            ctx.moveTo(pathObj.points[0].x - 150, pathObj.points[0].y - 175);
                            pathObj.points.forEach(p => ctx.lineTo(p.x - 150, p.y - 175));
                            ctx.stroke();
                        }
                    });
                }
                ctx.shadowBlur = 0; 

                // Nombre
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 190);

                // Corazón
                if (this.collisionTimer > 0 && !globalState.formation) {
                    ctx.font = "50px Arial"; ctx.globalAlpha = Math.min(this.collisionTimer, 1);
                    ctx.fillText("❤️", 0, -50); ctx.globalAlpha = 1;
                }

                ctx.restore(); ctx.save(); ctx.translate(this.x, this.y);

                // Globo de chat
                if (this.message !== "" && (Date.now() - this.messageTime) < 6000) {
                    ctx.font = "bold 16px Arial";
                    const textWidth = ctx.measureText(this.message).width;
                    const bWidth = Math.max(100, textWidth + 40);
                    
                    ctx.fillStyle = "white"; ctx.beginPath();
                    ctx.roundRect(-bWidth/2, -240, bWidth, 50, 15); ctx.fill();
                    
                    ctx.beginPath(); ctx.moveTo(0, -190); ctx.lineTo(-15, -200); ctx.lineTo(15, -200); ctx.fill();
                    ctx.fillStyle = "#1a1a1a"; ctx.textAlign = "center";
                    ctx.fillText(this.message, 0, -208);
                }
                ctx.restore();
            }
        }

        // --- FIREBASE ---
        database.ref('avatars').on('child_added', (snapshot) => {
            avatars.push(new Avatar(snapshot.val(), snapshot.key, avatars.length));
        });

        database.ref('avatars').on('child_changed', (snapshot) => {
            const data = snapshot.val();
            const avatar = avatars.find(a => a.id === snapshot.key);
            if(avatar) {
                avatar.message = data.message || ""; avatar.messageTime = data.messageTime || 0;
                avatar.isSpinning = data.isSpinning || false; avatar.isStarPower = data.isStarPower || false;
            }
        });

        database.ref('avatars').on('value', (snapshot) => { if (!snapshot.exists()) avatars = []; });
        database.ref('gameState').on('value', (snap) => { if(snap.exists()) globalState = snap.val(); });

        // Loop
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            avatars.forEach((a, i) => {
                a.update();
                a.draw();

                if(!globalState.frozen && !globalState.formation) {
                    for(let j = i + 1; j < avatars.length; j++) {
                        const other = avatars[j];
                        if (Math.hypot(a.x - other.x, a.y - other.y) < 120) {
                            a.collisionTimer = 1.5; other.collisionTimer = 1.5;
                        }
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
