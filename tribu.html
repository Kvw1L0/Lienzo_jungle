<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let avatars = [];
        let globalState = { frozen: false, formation: false, spinAll: false };

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Avatar {
            constructor(data, id, index) {
                this.id = id;
                this.paths = data.paths || [];
                this.name = data.userName || "";
                this.message = data.message || "";
                this.messageTime = data.messageTime || 0;
                this.isSpinning = data.isSpinning || false;
                this.isStarPower = data.isStarPower || false;
                
                this.x = canvas.width / 2; this.y = canvas.height / 2;
                this.rotation = 0;
                this.collisionTimer = 0;
                
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * (Math.random() * 2 + 1);
                this.vy = Math.sin(angle) * (Math.random() * 2 + 1);
                this.index = index; // Para la formación en cuadrícula
            }

            update(dt) {
                // 1. Manejo de Giro
                if (this.isSpinning || globalState.spinAll) {
                    this.rotation += 0.1 * dt; // Girar la cabeza
                } else {
                    // Volver a posición recta suavemente si deja de girar
                    this.rotation += (0 - this.rotation) * 0.1;
                }

                // 2. Manejo de Posición (Formación vs Aleatorio)
                if (globalState.formation) {
                    // Calcular posición en cuadrícula
                    const cols = Math.ceil(Math.sqrt(avatars.length));
                    const w = canvas.width / cols;
                    const h = canvas.height / Math.ceil(avatars.length / cols);
                    const targetX = (this.index % cols) * w + (w/2);
                    const targetY = Math.floor(this.index / cols) * h + (h/2);
                    
                    // Movimiento suave hacia su puesto
                    this.x += (targetX - this.x) * 0.05;
                    this.y += (targetY - this.y) * 0.05;
                } else if (!globalState.frozen) {
                    // Movimiento flotante normal
                    this.x += this.vx; this.y += this.vy;
                    const size = 150; 
                    if (this.x > canvas.width - size || this.x < size) this.vx *= -1;
                    if (this.y > canvas.height - size || this.y < size) this.vy *= -1;
                }

                if(this.collisionTimer > 0) this.collisionTimer -= dt * 0.05;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation); // Aplica el giro
                
                ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                
                // Efecto "Mix Color" (Mario Star)
                const starColor = `hsl(${(Date.now() / 5) % 360}, 100%, 60%)`;
                if(this.isStarPower) {
                    ctx.shadowBlur = 20; ctx.shadowColor = starColor;
                }

                if (this.paths.length > 0) {
                    this.paths.forEach(pathObj => {
                        if(pathObj.points && pathObj.points.length > 0) {
                            ctx.strokeStyle = this.isStarPower ? starColor : (pathObj.color || '#EC0000');
                            ctx.beginPath();
                            // Centrado
                            ctx.moveTo(pathObj.points[0].x - 150, pathObj.points[0].y - 175);
                            pathObj.points.forEach(p => ctx.lineTo(p.x - 150, p.y - 175));
                            ctx.stroke();
                        }
                    });
                }
                ctx.shadowBlur = 0; // Quitar glow para los textos

                // Texto de Nombre
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 190);

                // Colisión: Corazón
                if (this.collisionTimer > 0 && !globalState.formation) {
                    ctx.font = "50px Arial";
                    ctx.globalAlpha = Math.min(this.collisionTimer, 1);
                    ctx.fillText("❤️", 0, -50);
                    ctx.globalAlpha = 1;
                }

                ctx.restore(); // Restaurar rotación para la burbuja (no debe girar con la cabeza)
                ctx.save();
                ctx.translate(this.x, this.y);

                // Burbuja de Chat (Permanece 6 segundos tras ser enviada)
                if (this.message !== "" && (Date.now() - this.messageTime) < 6000) {
                    ctx.font = "bold 16px Arial";
                    const textWidth = ctx.measureText(this.message).width;
                    const bWidth = Math.max(100, textWidth + 40);
                    
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.roundRect(-bWidth/2, -240, bWidth, 50, 15);
                    ctx.fill();
                    
                    ctx.beginPath(); // Triangulito
                    ctx.moveTo(0, -190); ctx.lineTo(-15, -200); ctx.lineTo(15, -200); ctx.fill();

                    ctx.fillStyle = "#1a1a1a"; ctx.textAlign = "center";
                    ctx.fillText(this.message, 0, -208);
                }
                ctx.restore();
            }
        }

        // --- FIREBASE LISTENERS ---
        // Sincronizar Base de Datos Completa (Maneja el Admin Clear y Child_Added)
        database.ref('avatars').on('value', (snapshot) => {
            if (!snapshot.exists()) {
                avatars = []; // El Admin limpió la pantalla
            } else {
                const data = snapshot.val();
                let index = 0;
                avatars = []; // Reconstruir para mantener sincronía perfecta
                for (const key in data) {
                    avatars.push(new Avatar(data[key], key, index));
                    index++;
                }
            }
        });

        // Escuchar el Estado del Admin
        database.ref('gameState').on('value', (snap) => {
            if(snap.exists()) globalState = snap.val();
        });

        // Loop de Animación
        let lastTime = performance.now();
        function animate(now) {
            const dt = (now - lastTime) / 16; // Normalizado
            lastTime = now;
            
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Actualizar y Dibujar
            avatars.forEach((a, i) => {
                a.update(dt);
                a.draw();

                // Detección de Colisión para Corazones (Solo si no están quietos en formación)
                if(!globalState.frozen && !globalState.formation) {
                    for(let j = i + 1; j < avatars.length; j++) {
                        const other = avatars[j];
                        if (Math.hypot(a.x - other.x, a.y - other.y) < 100) {
                            a.collisionTimer = 2; other.collisionTimer = 2;
                        }
                    }
                }
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
