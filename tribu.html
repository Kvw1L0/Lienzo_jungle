<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; }
        canvas { display: block; }
        #overlay { position: absolute; top: 20px; left: 20px; color: #00ff88; font-family: monospace; font-size: 20px; text-shadow: 0 0 10px #00ff88; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="overlay">JUNGLE MULTIVERSE: PANTALLA ACTIVA</div>
    <canvas id="worldCanvas"></canvas>

    <script>
        // --- 1. CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc",
            authDomain: "jungle-multiverse.firebaseapp.com",
            databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com",
            projectId: "jungle-multiverse",
            storageBucket: "jungle-multiverse.firebasestorage.app",
            messagingSenderId: "648498270563",
            appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 2. CONFIGURACIÓN DEL CANVAS ---
        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let stickmen = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // --- 3. CLASE DEL PERSONAJE ---
        class Stickman {
            constructor(data) {
                this.paths = data.paths || [];
                this.mood = data.mood || 'zen';
                
                // Entrada "Wow" desde la izquierda
                this.x = -100; 
                this.y = Math.random() * (canvas.height - 100) + 50;
                
                this.config = this.getConfig(this.mood);
                this.vx = this.config.speed;
                this.vy = (Math.random() - 0.5) * 2;
                this.time = 0;
                this.collisionEffect = 0;
            }

            getConfig(mood) {
                const base = {
                    zen: { speed: 1.5, freq: 0.02, amp: 15, color: '#00ccff' },
                    happy: { speed: 3, freq: 0.1, amp: 30, color: '#ffff00' },
                    crazy: { speed: 5, freq: 0.3, amp: 50, color: '#ff00ff' }
                };
                return base[mood] || base.zen;
            }

            update(dt) {
                this.time += dt;
                this.x += this.vx;
                this.y += Math.sin(this.time * this.config.freq) * (this.config.amp * 0.1);

                // Efecto Pac-Man (Screen wrapping)
                if (this.x > canvas.width + 150) this.x = -150;
                if (this.x < -150) this.x = canvas.width + 150;
                if (this.y > canvas.height + 150) this.y = -150;
                if (this.y < -150) this.y = canvas.height + 150;
                
                if (this.collisionEffect > 0) this.collisionEffect -= 0.05;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                ctx.beginPath();
                ctx.strokeStyle = this.config.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (this.paths.length > 0) {
                    // Centrar el dibujo: restamos la mitad del tamaño del canvas móvil (300x400)
                    ctx.moveTo(this.paths[0].x - 150, this.paths[0].y - 200);
                    this.paths.forEach(p => {
                        ctx.lineTo(p.x - 150, p.y - 200);
                    });
                }
                ctx.stroke();

                // Feedback de Colisión
                if (this.collisionEffect > 0) {
                    ctx.font = "40px Arial";
                    ctx.fillText("⚡", -20, -100);
                }

                ctx.restore();
            }
        }

        // --- 4. LISTENER DE FIREBASE ---
        // Escucha cada vez que se agrega un dibujo nuevo a 'stickmen'
        database.ref('stickmen').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data && data.paths) {
                stickmen.push(new Stickman(data));
            }
        });

        // --- 5. LOOP DE ANIMACIÓN ---
        let lastTime = performance.now();
        function animate(now) {
            const dt = now - lastTime;
            lastTime = now;
            
            // Estela suave para dar fluidez
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stickmen.forEach((s, i) => {
                s.update(dt * 0.1);
                s.draw();

                // Detección de colisiones
                stickmen.forEach((other, j) => {
                    if (i !== j) {
                        const dist = Math.hypot(s.x - other.x, s.y - other.y);
                        if (dist < 50 && s.collisionEffect <= 0 && other.collisionEffect <= 0) {
                            s.collisionEffect = 1;
                            other.collisionEffect = 1;
                        }
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
