<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Multiverso - Display</title>
    <style>
        body { margin: 0; background: #0a0a0a; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let avatars = [];
        
        // Variables para el UX de Spotlight
        let spotlightTimer = 0; 
        let newestAvatarId = null;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Avatar {
            constructor(data, id) {
                this.id = id;
                this.paths = data.paths || [];
                this.name = data.userName || "Invitado";
                this.helloTimer = 0; // Temporizador para la burbuja de cómic
                
                // Movimiento inicial y aparición en centro
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                
                // Velocidad aleatoria en cualquier dirección (Omnidireccional)
                this.speed = Math.random() * 2 + 1.5; 
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }

            update(dt) {
                // Movimiento constante
                this.x += this.vx;
                this.y += this.vy;

                // Rebote en los bordes para mantenerlos siempre visibles
                const size = 150; 
                if (this.x > canvas.width - size || this.x < size) this.vx *= -1;
                if (this.y > canvas.height - size || this.y < size) this.vy *= -1;

                // Reducir temporizador de la burbuja "Hola"
                if(this.helloTimer > 0) this.helloTimer -= dt * 0.1;
            }

            draw(globalSpotlightActivo) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Lógica UX Spotlight: Si hay alguien nuevo y no soy yo, me hago transparente
                if (globalSpotlightActivo && this.id !== newestAvatarId) {
                    ctx.globalAlpha = 0.2; // Rostros antiguos se difuminan
                } else if (globalSpotlightActivo && this.id === newestAvatarId) {
                    ctx.shadowBlur = 30; // El rostro nuevo brilla
                    ctx.shadowColor = "white";
                }
                
                ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                
                // Dibujar el rostro
                if (this.paths.length > 0) {
                    this.paths.forEach(pathObj => {
                        if(pathObj.points && pathObj.points.length > 0) {
                            ctx.strokeStyle = pathObj.color || '#EC0000';
                            ctx.beginPath();
                            // Centrado ajustado al tamaño del canvas móvil
                            ctx.moveTo(pathObj.points[0].x - 150, pathObj.points[0].y - 175);
                            pathObj.points.forEach(p => ctx.lineTo(p.x - 150, p.y - 175));
                            ctx.stroke();
                        }
                    });
                }

                ctx.shadowBlur = 0; // Quitar brillo para el texto
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 190);

                // Dibujar Burbuja de Cómic "HOLA"
                if (this.helloTimer > 0) {
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.roundRect(50, -220, 100, 50, 10);
                    ctx.fill();
                    
                    // Triángulo de la burbuja
                    ctx.beginPath();
                    ctx.moveTo(60, -170);
                    ctx.lineTo(80, -170);
                    ctx.lineTo(50, -140);
                    ctx.fill();

                    ctx.fillStyle = "black";
                    ctx.font = "bold 20px Arial";
                    ctx.fillText("¡HOLA!", 100, -185);
                }

                ctx.restore();
            }
        }

        // Listener: Dibujo Nuevo
        database.ref('avatars').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data && data.paths) {
                const newAvatar = new Avatar(data, snapshot.key);
                avatars.push(newAvatar);
                
                // Activar Spotlight UX por ~4 segundos
                spotlightTimer = 400; 
                newestAvatarId = snapshot.key;
            }
        });

        // Listener: Botón "Hola" presionado en móvil
        database.ref('avatars').on('child_changed', (snapshot) => {
            const data = snapshot.val();
            const avatar = avatars.find(a => a.id === snapshot.key);
            if (avatar && data.sayHello) {
                avatar.helloTimer = 300; // Activa la burbuja unos 3 segundos
            }
        });

        let lastTime = performance.now();
        function animate(now) {
            const dt = now - lastTime;
            lastTime = now;
            
            // Fondo con estela suave
            ctx.fillStyle = 'rgba(10, 10, 10, 0.4)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (spotlightTimer > 0) spotlightTimer -= dt * 0.1;

            const isSpotlightActive = spotlightTimer > 0;

            avatars.forEach(a => {
                a.update(dt);
                a.draw(isSpotlightActive);
            });

            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);
    </script>
</body>
</html>
