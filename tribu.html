<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Multiverse - Display</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; }
        canvas { display: block; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <canvas id="worldCanvas"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc",
            authDomain: "jungle-multiverse.firebaseapp.com",
            databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com",
            projectId: "jungle-multiverse",
            storageBucket: "jungle-multiverse.firebasestorage.app",
            messagingSenderId: "648498270563",
            appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('worldCanvas');
        const ctx = canvas.getContext('2d');
        let stickmen = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Stickman {
            constructor(data) {
                this.paths = data.paths || [];
                this.mood = data.mood || 'zen';
                this.name = data.userName || "Jungle Explorer";
                
                // Posición inicial aleatoria
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                
                this.config = this.getConfig(this.mood);
                
                // Movimiento aleatorio en todas las direcciones
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * this.config.speed;
                this.vy = Math.sin(angle) * this.config.speed;
                
                this.time = 0;
                this.collisionEffect = 0;
            }

            getConfig(mood) {
                const base = {
                    zen: { speed: 0.8, freq: 0.02, amp: 10, color: '#00ccff' },
                    happy: { speed: 2.5, freq: 0.1, amp: 25, color: '#ffff00' },
                    crazy: { speed: 5, freq: 0.3, amp: 40, color: '#ff00ff' }
                };
                return base[mood] || base.zen;
            }

            update(dt) {
                this.time += dt;
                this.x += this.vx;
                this.y += this.vy;

                // Efecto Pac-Man (Salida por un lado, entrada por el otro)
                const margin = 100;
                if (this.x > canvas.width + margin) this.x = -margin;
                if (this.x < -margin) this.x = canvas.width + margin;
                if (this.y > canvas.height + margin) this.y = -margin;
                if (this.y < -margin) this.y = canvas.height + margin;
                
                if (this.collisionEffect > 0) this.collisionEffect -= 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Dibujar Trazo
                ctx.beginPath();
                ctx.strokeStyle = this.config.color;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                if (this.paths.length > 0) {
                    ctx.moveTo(this.paths[0].x - 150, this.paths[0].y - 200);
                    this.paths.forEach(p => ctx.lineTo(p.x - 150, p.y - 200));
                }
                ctx.stroke();

                // Nombre debajo del dibujo
                ctx.fillStyle = "white";
                ctx.font = "bold 16px Arial";
                ctx.textAlign = "center";
                ctx.fillText(this.name.toUpperCase(), 0, 180);

                // Efecto Corazón en colisión
                if (this.collisionEffect > 0) {
                    ctx.font = "50px Arial";
                    ctx.globalAlpha = this.collisionEffect;
                    ctx.fillText("❤️", 0, -50);
                }

                ctx.restore();
            }
        }

        database.ref('stickmen').on('child_added', (snapshot) => {
            const data = snapshot.val();
            if (data && data.paths) {
                stickmen.push(new Stickman(data));
            }
        });

        let lastTime = performance.now();
        function animate(now) {
            const dt = now - lastTime;
            lastTime = now;
            
            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            stickmen.forEach((s, i) => {
                s.update(dt * 0.1);
                s.draw();

                // Detección de colisiones
                for(let j = i + 1; j < stickmen.length; j++) {
                    const other = stickmen[j];
                    const dist = Math.hypot(s.x - other.x, s.y - other.y);
                    if (dist < 80) {
                        s.collisionEffect = 1;
                        other.collisionEffect = 1;
                    }
                }
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
</html>
