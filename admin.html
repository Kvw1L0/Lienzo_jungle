<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jungle Admin</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #222; padding: 30px; border-radius: 20px; width: 300px; text-align: center; }
        button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div class="panel">
        <h1 style="color:#EC0000">ADMIN V2</h1>
        <button style="background:#EC0000" onclick="resetAll()">BORRAR TODO</button>
        <button style="background:#4EB1B3" onclick="toggle('frozen')">CONGELAR/PLAY</button>
        <button style="background:#E89C31" onclick="toggle('formation')">FORMACIÓN/LIBRE</button>
        <button style="background:#A24281" onclick="toggle('spinAll')">GIRAR TODOS</button>
    </div>
    <script>
        firebase.initializeApp({ apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com" });
        const db = firebase.database();
        function toggle(key) { db.ref('gameState/'+key).transaction(v => !v); }
        function resetAll() { db.ref('avatars').remove(); db.ref('gameState').set({frozen:false, formation:false, spinAll:false}); }
    </script>
</body>
</html>
