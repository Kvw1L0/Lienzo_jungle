<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crea tu Avatar</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        #name-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #name-input { padding: 15px; font-size: 1.2rem; border-radius: 8px; border: none; margin: 20px 0; width: 80%; text-align: center; }
        #start-btn { padding: 15px 40px; background: #EC0000; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        .header { text-align: center; margin-top: 10px; }
        
        /* Paleta Corporativa Extraída de la Imagen */
        .tools-panel { display: flex; gap: 15px; margin-bottom: 15px; justify-content: center; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
        .color-btn.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* Contenedores de Vistas */
        #draw-view { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #souvenir-view { display: none; flex-direction: column; align-items: center; width: 100%; margin-top: 20px; }
        
        #canvas-container { position: relative; width: 300px; height: 350px; background: #222; border: 2px solid #333; border-radius: 15px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }
        
        /* Nueva Silueta de Rostro */
        .guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.15; display: flex; justify-content: center; align-items: center; }
        
        .controls { width: 300px; margin-top: 15px; display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        button { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-clear { background: #444; color: white; }
        .btn-send { background: #EC0000; color: white; }

        /* Vista Souvenir */
        #souvenir-img { width: 250px; height: auto; border-radius: 15px; background: #222; border: 2px solid #EC0000; margin-bottom: 20px; }
        .btn-hello { background: #4EB1B3; color: white; width: 250px; padding: 20px; font-size: 1.5rem; border-radius: 50px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="name-popup">
        <h1 style="color: #EC0000;">¡BIENVENIDO!</h1>
        <p>¿Cómo te llamas?</p>
        <input type="text" id="name-input" placeholder="Tu nombre" maxlength="15">
        <button id="start-btn" onclick="saveName()">COMENZAR</button>
    </div>

    <div class="header">
        <h3 id="welcome-text" style="margin: 0; color: #EC0000;">DIBUJA TU ROSTRO</h3>
    </div>

    <div id="draw-view">
        <div class="tools-panel">
            <button class="color-btn active" style="background: #EC0000;" onclick="setColor('#EC0000', this)"></button> <button class="color-btn" style="background: #E89C31;" onclick="setColor('#E89C31', this)"></button> <button class="color-btn" style="background: #4EB1B3;" onclick="setColor('#4EB1B3', this)"></button> <button class="color-btn" style="background: #A24281;" onclick="setColor('#A24281', this)"></button> <button class="color-btn" style="background: #4EA180;" onclick="setColor('#4EA180', this)"></button> </div>

        <div id="canvas-container">
            <div class="guide">
                <svg width="250" height="300" viewBox="0 0 100 120">
                    <ellipse cx="50" cy="55" rx="35" ry="50" fill="none" stroke="white" stroke-width="2" stroke-dasharray="4,4"/>
                    <circle cx="35" cy="45" r="4" fill="white"/>
                    <circle cx="65" cy="45" r="4" fill="white"/>
                    <path d="M 40 80 Q 50 90 60 80" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
            <canvas id="paintCanvas" width="300" height="350"></canvas>
        </div>

        <div class="controls">
            <button class="btn-clear" onclick="clearCanvas()">BORRAR</button>
            <button class="btn-send" onclick="sendToMultiverse()">ENVIAR</button>
        </div>
    </div>

    <div id="souvenir-view">
        <p style="color: #4EB1B3; font-weight: bold; margin-top: 0;">¡TU AVATAR ESTÁ EN LA PANTALLA!</p>
        <img id="souvenir-img" src="" alt="Tu dibujo">
        <button class="btn-hello" onclick="sayHello()">¡DI HOLA!</button>
        <button style="background: transparent; border: 1px solid #555; color: #aaa; margin-top: 15px;" onclick="resetApp()">Dibujar otro</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userName = "";
        let myAvatarRef = null; // Guardará la referencia exacta de este usuario

        function saveName() {
            const input = document.getElementById('name-input');
            if(input.value.trim() === "") return;
            userName = input.value.trim();
            document.getElementById('name-popup').style.display = 'none';
        }

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false; let paths = []; let currentPath = []; let currentColor = '#EC0000';

        ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        function setColor(color, btn) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        const startDrawing = (e) => { drawing = true; currentPath = []; paths.push({ color: currentColor, points: currentPath }); addPoint(e); };
        const draw = (e) => { if (!drawing) return; addPoint(e); };
        const stopDrawing = () => { drawing = false; };

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            currentPath.push({x, y});
            redrawAll();
        }

        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(pathObj => {
                if(pathObj.points.length > 0) {
                    ctx.strokeStyle = pathObj.color; ctx.beginPath();
                    ctx.moveTo(pathObj.points[0].x, pathObj.points[0].y);
                    pathObj.points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.stroke();
                }
            });
        }

        function clearCanvas() { paths = []; redrawAll(); }

        function sendToMultiverse() {
            if (paths.length === 0) return;
            
            // UX: Vibración táctil si el dispositivo lo soporta
            if (navigator.vibrate) navigator.vibrate(200);

            const drawingData = { paths: paths, userName: userName, timestamp: Date.now(), sayHello: 0 };
            
            // Creamos un nodo único y lo guardamos
            myAvatarRef = database.ref('avatars').push();
            myAvatarRef.set(drawingData).then(() => {
                // Generar imagen estática para el souvenir
                document.getElementById('souvenir-img').src = canvas.toDataURL();
                
                // Cambiar de vista
                document.getElementById('draw-view').style.display = 'none';
                document.getElementById('souvenir-view').style.display = 'flex';
                document.getElementById('welcome-text').innerText = userName.toUpperCase();
            });
        }

        function sayHello() {
            if(myAvatarRef) {
                // UX: Vibración corta al decir hola
                if (navigator.vibrate) navigator.vibrate([50, 50]);
                // Actualiza el nodo en tiempo real para que la pantalla lo detecte
                myAvatarRef.update({ sayHello: Date.now() });
            }
        }

        function resetApp() {
            clearCanvas();
            document.getElementById('souvenir-view').style.display = 'none';
            document.getElementById('draw-view').style.display = 'flex';
            document.getElementById('welcome-text').innerText = "DIBUJA TU ROSTRO";
        }

        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stopDrawing);
    </script>
</body>
</html>
