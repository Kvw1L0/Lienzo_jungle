<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crea tu Avatar</title>
    <style>
        body { margin: 0; background: url('fondo.png') no-repeat center center fixed; background-size: cover; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        
        /* UI Glassmorphism */
        .glass-panel { background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; width: 90%; max-width: 350px; margin-top: 10px; transition: box-shadow 0.3s ease; }
        
        #name-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #name-input { padding: 15px; font-size: 1.2rem; border-radius: 12px; border: none; margin: 20px 0; width: 80%; text-align: center; outline: none; background: rgba(255,255,255,0.9); }
        .btn-primary { padding: 15px 40px; background: #EC0000; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 15px rgba(236,0,0,0.4); }

        /* Herramientas corporativas */
        .tools-panel { display: flex; gap: 12px; margin-bottom: 15px; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s, border-color 0.2s; }
        .color-btn.active { border-color: white; transform: scale(1.2); }

        #canvas-container { position: relative; width: 100%; height: 350px; background: rgba(0,0,0,0.3); border-radius: 15px; overflow: hidden; touch-action: none; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        /* Silueta animada (sin rostro) */
        .guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.3; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s; }
        .guide svg path { stroke-dasharray: 400; stroke-dashoffset: 400; animation: drawGuide 2s forwards ease-in-out; }
        @keyframes drawGuide { to { stroke-dashoffset: 0; } }

        .controls { width: 100%; margin-top: 15px; display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }
        .btn-controls { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; color: white; }
        
        /* Vista de Interacción (Souvenir) */
        #souvenir-view { display: none; }
        .chat-input { width: calc(100% - 20px); padding: 12px; border-radius: 12px; border: none; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .btn-neon { background: linear-gradient(45deg, #EC0000, #E89C31, #4EB1B3, #A24281); background-size: 300%; animation: gradientBG 3s infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="name-popup">
        <h1 style="color: #EC0000; text-shadow: 0 0 10px rgba(236,0,0,0.5);">JUNGLE MULTIVERSE</h1>
        <input type="text" id="name-input" placeholder="Ingresa tu apodo" maxlength="12">
        <button class="btn-primary" onclick="saveName()">COMENZAR</button>
    </div>

    <div id="draw-view" class="glass-panel">
        <h3 id="welcome-text" style="margin: 0 0 15px 0; color: white;">DIBUJA TU ROSTRO</h3>
        
        <div class="tools-panel">
            <button class="color-btn active" style="background: #EC0000;" onclick="setColor('#EC0000', this)"></button>
            <button class="color-btn" style="background: #E89C31;" onclick="setColor('#E89C31', this)"></button>
            <button class="color-btn" style="background: #4EB1B3;" onclick="setColor('#4EB1B3', this)"></button>
            <button class="color-btn" style="background: #A24281;" onclick="setColor('#A24281', this)"></button>
            <button class="color-btn" style="background: #4EA180;" onclick="setColor('#4EA180', this)"></button>
        </div>

        <div id="canvas-container">
            <div class="guide" id="drawing-guide">
                <svg width="200" height="250" viewBox="0 0 100 120">
                    <path d="M 25 120 Q 25 90 50 90 Q 75 90 75 120 M 50 90 Q 80 90 80 45 Q 80 10 50 10 Q 20 10 20 45 Q 20 90 50 90" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="2" stroke-dasharray="5,5"/>
                </svg>
            </div>
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn-controls" style="background: #444;" onclick="clearCanvas()">BORRAR</button>
            <button class="btn-controls" style="background: #EC0000;" onclick="sendToMultiverse()">ENVIAR A PANTALLA</button>
        </div>
    </div>

    <div id="souvenir-view" class="glass-panel">
        <h3 style="color: #4EB1B3; margin-top: 0;">¡ESTÁS EN LA PANTALLA!</h3>
        
        <input type="text" id="chat-box" class="chat-input" placeholder="Escribe un mensaje..." maxlength="25">
        <button class="btn-controls" style="background: #4EB1B3; width: 100%; margin-bottom: 15px;" onclick="sendMessage()">ENVIAR MENSAJE</button>

        <div class="action-grid">
            <button class="btn-controls" style="background: #E89C31;" id="btn-spin">🔄 MANTENER GIRAR</button>
            <button class="btn-controls btn-neon" id="btn-mix" onclick="toggleMixColor()">🌟 MIX COLOR</button>
        </div>
        
        <button style="background: transparent; border: none; color: #aaa; margin-top: 20px; text-decoration: underline;" onclick="resetApp()">Dibujar de nuevo</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCC_TF76FJatTPEMjZTzC9eiStnsrDd1qc", authDomain: "jungle-multiverse.firebaseapp.com", databaseURL: "https://jungle-multiverse-default-rtdb.firebaseio.com", projectId: "jungle-multiverse", storageBucket: "jungle-multiverse.firebasestorage.app", messagingSenderId: "648498270563", appId: "1:648498270563:web:76384ba26c1ca4e38d8356"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userName = ""; let myAvatarRef = null; let isMixColor = false;

        function saveName() {
            const input = document.getElementById('name-input');
            if(input.value.trim() === "") return;
            userName = input.value.trim();
            document.getElementById('name-popup').style.display = 'none';
        }

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        // Ajustar tamaño del canvas interno al contenedor
        canvas.width = container.clientWidth; canvas.height = container.clientHeight;

        let drawing = false; let paths = []; let currentPath = []; let currentColor = '#EC0000';
        ctx.lineWidth = 6; ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        function setColor(color, btn) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            // UX: Resplandor del panel según el color elegido
            document.getElementById('draw-view').style.boxShadow = `0 8px 32px ${color}44`;
        }

        const startDrawing = (e) => { 
            document.getElementById('drawing-guide').style.opacity = '0'; // Quitar guía al tocar
            drawing = true; currentPath = []; paths.push({ color: currentColor, points: currentPath }); addPoint(e); 
        };
        const draw = (e) => { if (!drawing) return; addPoint(e); };
        const stopDrawing = () => { drawing = false; };

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            currentPath.push({x, y}); redrawAll();
        }

        function redrawAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(pathObj => {
                if(pathObj.points.length > 0) {
                    ctx.strokeStyle = pathObj.color; ctx.beginPath();
                    ctx.moveTo(pathObj.points[0].x, pathObj.points[0].y);
                    pathObj.points.forEach(p => ctx.lineTo(p.x, p.y));
                    ctx.stroke();
                }
            });
        }

        function clearCanvas() { paths = []; redrawAll(); document.getElementById('drawing-guide').style.opacity = '0.3'; }

        function sendToMultiverse() {
            if (paths.length === 0) return;
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]); // Haptic premium

            const drawingData = { 
                paths: paths, userName: userName, timestamp: Date.now(), 
                message: "", isSpinning: false, isStarPower: false 
            };
            
            myAvatarRef = database.ref('avatars').push();
            myAvatarRef.set(drawingData).then(() => {
                document.getElementById('draw-view').style.display = 'none';
                document.getElementById('souvenir-view').style.display = 'flex';
            });
        }

        // --- CONTROLES EN VIVO ---
        function sendMessage() {
            const text = document.getElementById('chat-box').value;
            if(text.trim() !== "" && myAvatarRef) {
                myAvatarRef.update({ message: text.trim(), messageTime: Date.now() });
                document.getElementById('chat-box').value = ""; // Limpiar
                if (navigator.vibrate) navigator.vibrate(50);
            }
        }

        // Girar mientras se mantiene presionado
        const btnSpin = document.getElementById('btn-spin');
        const startSpin = (e) => { e.preventDefault(); if(myAvatarRef) myAvatarRef.update({ isSpinning: true }); };
        const stopSpin = (e) => { e.preventDefault(); if(myAvatarRef) myAvatarRef.update({ isSpinning: false }); };
        
        btnSpin.addEventListener('mousedown', startSpin); btnSpin.addEventListener('touchstart', startSpin);
        window.addEventListener('mouseup', stopSpin); window.addEventListener('touchend', stopSpin);

        function toggleMixColor() {
            if(myAvatarRef) {
                isMixColor = !isMixColor;
                myAvatarRef.update({ isStarPower: isMixColor });
                if (navigator.vibrate) navigator.vibrate([30, 30, 30]);
            }
        }

        function resetApp() {
            clearCanvas(); isMixColor = false;
            document.getElementById('souvenir-view').style.display = 'none';
            document.getElementById('draw-view').style.display = 'flex';
        }

        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', stopDrawing);
    </script>
</body>
</html>
