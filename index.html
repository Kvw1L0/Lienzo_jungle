<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jungle - Crea tu Avatar</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 20px; text-align: center; }
        #canvas-container { position: relative; width: 300px; height: 400px; background: #222; border: 2px solid #333; border-radius: 15px; }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; cursor: crosshair; }
        .guide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.1; display: flex; justify-content: center; align-items: center; }
        .controls { width: 300px; margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        button { padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-send { grid-column: span 3; background: #00ff88; color: #1a1a1a; margin-top: 10px; font-size: 1.2rem; }
        .personality-btn { background: #333; color: white; border: 2px solid transparent; }
        .personality-btn.active { border-color: #00ff88; background: #444; }
        .color-palette { display: flex; gap: 10px; margin-top: 10px; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; }
    </style>
</head>
<body>
    <div class="header">
        <h2>JUNGLE MULTIVERSE</h2>
        <p>Dibuja sobre la guía</p>
    </div>

    <div id="canvas-container">
        <div class="guide">
            <svg width="200" height="300" viewBox="0 0 100 150">
                <circle cx="50" cy="30" r="15" fill="white" />
                <line x1="50" y1="45" x2="50" y2="100" stroke="white" stroke-width="4" />
                <line x1="50" y1="60" x2="20" y2="40" stroke="white" stroke-width="4" />
                <line x1="50" y1="60" x2="80" y2="40" stroke="white" stroke-width="4" />
                <line x1="50" y1="100" x2="30" y2="140" stroke="white" stroke-width="4" />
                <line x1="50" y1="100" x2="70" y2="140" stroke="white" stroke-width="4" />
            </svg>
        </div>
        <canvas id="paintCanvas" width="300" height="400"></canvas>
    </div>

    <div class="controls">
        <button class="personality-btn active" onclick="setMood('zen', this)">ZEN</button>
        <button class="personality-btn" onclick="setMood('happy', this)">FELIZ</button>
        <button class="personality-btn" onclick="setMood('crazy', this)">LOCO</button>
        <button class="btn-send" onclick="sendToMultiverse()">¡ENVIAR A PANTALLA!</button>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let currentMood = 'zen';
        let paths = [];

        // Configuración de trazo (UX: Suavizado)
        ctx.strokeStyle = '#00ff88';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const startDrawing = (e) => { drawing = true; ctx.beginPath(); addPoint(e); };
        const draw = (e) => { if (!drawing) return; addPoint(e); };
        const stopDrawing = () => { drawing = false; };

        function addPoint(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            ctx.lineTo(x, y);
            ctx.stroke();
            paths.push({x, y});
        }

        function setMood(mood, btn) {
            currentMood = mood;
            document.querySelectorAll('.personality-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function sendToMultiverse() {
            const drawingData = {
                paths: paths,
                mood: currentMood,
                userName: "Explorer_" + Math.floor(Math.random()*100),
                timestamp: Date.now()
            };
            
            console.log("Enviando a Firebase...", drawingData);
            alert("¡Mira la pantalla gigante!");
            // Aquí integrarías: firebase.database().ref('stickmen').push(drawingData);
            ctx.clearRect(0,0, canvas.width, canvas.height);
            paths = [];
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);
    </script>
</body>
</html>
